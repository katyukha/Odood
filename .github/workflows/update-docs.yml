name: Deploy mdBook site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  ODOOD_DLANG_COMPILER: ldc-1.41.0

jobs:
  build-docs-command-ref:
    name: Build Ubuntu:24.04
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install D compiler
        uses: dlang-community/setup-dlang@v1
        with:
          compiler: ${{ env.ODOOD_DLANG_COMPILER }}

      - name: Install system dependencies
        uses: lyricwulf/abc@v1
        with:
          linux: libzip-dev libpq-dev python3-dev

      - name: Build Odood
        run: |
          dub build -c generate-command-ref

      - name: Upload Odood Docs Command Ref
        uses: actions/upload-artifact@v4
        with:
          name: odood-docs-command-ref
          path: |
            build/odood-docs-command-ref.md

  # Build job
  build-docs:
    runs-on: ubuntu-latest
    needs: build-docs-command-ref
    env:
      MDBOOK_VERSION: 0.4.43
    steps:
      - uses: actions/checkout@v4
      - name: 'Download command ref doc'
        uses: actions/download-artifact@v4
        with:
          name: odood-docs-command-ref
          path: docs/odood/src/
      - name: Install mdBook
        run: |
          curl --proto '=https' --tlsv1.2 https://sh.rustup.rs -sSf -y | sh
          rustup update
          cargo install --version ${MDBOOK_VERSION} mdbook
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Build with mdBook
        run: mdbook build ./docs/odood
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs/odood/book

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-docs
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

